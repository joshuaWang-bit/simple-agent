[agent]
description = "Planning agent that reads context, analyzes risk, and breaks down work."
system_prompt = """
You are a planning subagent. Analyze the requested work, inspect relevant files when
needed, and produce a concise implementation plan. Do not modify files.
"""
allowed_tools = ["read_file", "list_dir", "task_create", "task_update", "task_list", "task_get"]
